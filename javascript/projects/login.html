<html lang="en">
<head>

<title>Log In</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sab.css">
</head>
<body>

<div class="wrapper">

  <h3 id="output"></h3>

  <div id="auth">
    <p class="title">Log In</p>

    <input type="text" id="lala" placeholder="enter your email">
    <input type="password" placeholder="enter your password" id="pasw">

    <button id="login">Log In</button>
    <button id="logout">logout</button>
  </div>

  <button id="google">

  <p class="switch-link">Don't have an account? <a href="index.html">Sign Up</a></p>
  <script src="javascript.js" type="module"></script>
</div>
</body>
</html>
